[pytest]
# This is the configuration file for pytest.
# It tells pytest how to behave when running tests.

# asyncio_mode = auto means pytest will automatically detect any test function 
# that is defined with 'async def' and run it using the asyncio event loop.
# Without this, pytest wouldn't know how to run async tests!
asyncio_mode = auto

# testpaths tells pytest where to look for tests.
testpaths = tests

# Add the current directory to sys.path so we can import 'main' and 'services'
pythonpath = .

# log_cli = true allows us to see log messages (like info and debug) in the console while tests run.
log_cli = true
log_cli_level = INFO
