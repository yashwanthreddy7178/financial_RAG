name: Deploy to AWS ECS

on:
  push:
    branches:
      - main  # Trigger this workflow only when code is pushed to the main branch

env:
  AWS_REGION: us-east-2                   # Set this to your preferred AWS region
  ECR_REPOSITORY: financial-rag-engine    # Name of the ECR repository we will create
  ECS_SERVICE: financial-rag-service      # Name of the ECS Service we will create
  ECS_CLUSTER: financial-rag-cluster      # Name of the ECS Cluster we will create
  ECS_TASK_DEFINITION: .aws/task-def.json # Path to your task definition file (we will create this later)
  CONTAINER_NAME: financial-rag-container       # Name of the container inside the task definition

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run Pytest
      # Dummy API keys let pydantic-settings initialise Settings() without error.
      # Unit tests mock all external calls so no real credentials are used.
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || 'sk-test-placeholder' }}
        PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY || 'pcsk-test-placeholder' }}
        PINECONE_INDEX_NAME: financial-rag
      run: |
        pytest tests/ -v --cov=services --cov=main --cov-fail-under=75

  deploy:
    name: Deploy
    needs: test # Ensure tests pass before deploying
    runs-on: ubuntu-latest
    environment: production

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build, tag, and push image to Amazon ECR
      id: build-image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        # Build a docker container and push it to ECR so that it can be deployed to ECS.
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

    # NOTE: The steps below require you to have set up ECS and created a task definition file.
    # Once your AWS infrastructure is set up, uncomment the steps below to enable fully automated deployments!

    - name: Fill in the new image ID in the Amazon ECS task definition
      id: task-def
      uses: aws-actions/amazon-ecs-render-task-definition@v1
      with:
        task-definition: ${{ env.ECS_TASK_DEFINITION }}
        container-name: ${{ env.CONTAINER_NAME }}
        image: ${{ steps.build-image.outputs.image }}

    - name: Deploy Amazon ECS task definition
      uses: aws-actions/amazon-ecs-deploy-task-definition@v1
      with:
        task-definition: ${{ steps.task-def.outputs.task-definition }}
        service: ${{ env.ECS_SERVICE }}
        cluster: ${{ env.ECS_CLUSTER }}
        wait-for-service-stability: true
